<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>

    <div class="navbar">
        <h1>RINL Sales Reports</h1>
    </div>

    <div class="card">

        <h2>Generate Report</h2>

        <label>Month</label><br>
        <select>
            <option>January</option>
            <option>February</option>
            <option>March</option>
            <option>April</option>
        </select>

        <br><br>

        <label>State</label><br>
        <select>
            <option>Andhra Pradesh</option>
            <option>Telangana</option>
            <option>Tamil Nadu</option>
            <option>Karnataka</option>
        </select>

        <br><br>

        <button>Generate Report</button>

    </div>

    <div class="card">

        <h2>Sales Report</h2>

        <table border="1" width="100%">
            <tr>
                <th>Customer</th>
                <th>State</th>
                <th>Product</th>
                <th>Revenue</th>
            </tr>

            <tr>
                <td>Sharma Constructions</td>
                <td>Andhra Pradesh</td>
                <td>TMT Bars</td>
                <td>₹1,00,000</td>
            </tr>

            <tr>
                <td>Varma Industries</td>
                <td>Telangana</td>
                <td>Wire Rods</td>
                <td>₹2,00,000</td>
            </tr>

        </table>

    </div>

</body>
</html>
