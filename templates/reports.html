<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
</head>
<body>

<h1>Region Wise Sales Report</h1>

<table border="1">
    <tr>
        <th>Region</th>
        <th>Total Sales</th>
    </tr>

    {% for row in report_data %}

        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
