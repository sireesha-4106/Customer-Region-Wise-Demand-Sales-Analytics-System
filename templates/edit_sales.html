<!DOCTYPE html>
<html>
<head>
    <title>Edit Sales Record</title>
</head>
<body>

<h2>Edit Record</h2>

<form method="POST">

<input type="text" name="customer_name" value="{{ record[1] }}">
<input type="text" name="state" value="{{ record[2] }}">
<input type="text" name="region" value="{{ record[3] }}">
<input type="text" name="product_name" value="{{ record[4] }}">
<input type="text" name="sales" value="{{ record[5] }}">

    <button type="submit">Update</button>

</form>

</body>
</html>
